        function machineLearningRandomActivation() {
            // For demonstration purposes, the actual ML function is not used as I am a college student and don't want to pay for a GPU cluster to run this project on. Instead you can have a random number generator that simulates the actual linear regression used. Email me for inquiries regarding the prediction model
            return Math.random();
        }
        // Satellite js function
        function getSatelliteLocation(date, line1, line2) {
            /******************
             * satellite-js is a library that includes a set of
             * functions to convert TLE to geographic locations
             * We use this to get the geographic location of the
             * satellites for the current date. For more details
             * on satellite-js visib the github repo
             * https://github.com/shashwatak/satellite-js
             ******************/
            const satrec = satellite.twoline2satrec(line1, line2);
            const position_and_velocity = satellite.propagate(
                satrec,
                date.getUTCFullYear(),
                date.getUTCMonth() + 1,
                date.getUTCDate(),
                date.getUTCHours(),
                date.getUTCMinutes(),
                date.getUTCSeconds()
            );
            const position_eci = position_and_velocity.position;

            const gmst = satellite.gstime_from_date(
                date.getUTCFullYear(),
                date.getUTCMonth() + 1,
                date.getUTCDate(),
                date.getUTCHours(),
                date.getUTCMinutes(),
                date.getUTCSeconds()
            );

            const position_gd = satellite.eci_to_geodetic(position_eci, gmst);

            let longitude = position_gd.longitude;
            let latitude = position_gd.latitude;
            let height = position_gd.height;
            if (isNaN(longitude) || isNaN(latitude) || isNaN(height)) {
                return null;
            }
            const rad2deg = 180 / Math.PI;
            while (longitude < -Math.PI) {
                longitude += 2 * Math.PI;
            }
            while (longitude > Math.PI) {
                longitude -= 2 * Math.PI;
            }
            return {
                type: "point", // Autocasts as new Point()
                x: rad2deg * longitude,
                y: rad2deg * latitude,
                z: height * 1000
            };
        }

        // Add Modules
        require([
            "esri/config",
            "esri/Map",
            "esri/views/SceneView",
            "esri/layers/GraphicsLayer",
            "esri/Graphic",
            "esri/geometry/Point"
        ], (esriConfig, Map, SceneView, GraphicsLayer, Graphic, Point) => {

            // Create map
            const map = new Map({
                basemap: "satellite",
                ground: "world-elevation"
            });

            // Create view
            const view = new SceneView({
                container: "viewDiv",
                map: map,
                constraints: {
                    altitude: {
                        max: 1000000000 // meters
                    }
                },
                popup: {
                    dockEnabled: true,
                    dockOptions: {
                        breakpoint: false
                    }
                },
                environment: {
                    lighting: {
                        type: "virtual"
                    },
                    starsEnabled: false,
                }
            });

            view.popup.watch("selectedFeature", () => {
                satelliteTracks.removeAll();
            });

            view.popup.on("trigger-action", (event) => {
                if (event.action.id === "track") {
                    satelliteTracks.removeAll();

                    let graphic = view.popup.selectedFeature;
                    let trackFeatures = [];

                    for (let i = 0; i < 60 * 3; i++) {
                        let loc = null;
                        try {
                            loc = getSatelliteLocation(
                                new Date(Date.now() + i * 1000 * 60),
                                graphic.attributes.line1,
                                graphic.attributes.line2
                            );
                        } catch (error) {}

                        if (loc !== null) {
                            trackFeatures.push([loc.x, loc.y, loc.z]);
                        }
                    }

                    let track = new Graphic({
                        geometry: {
                            type: "polyline", // autocasts as new Polyline()
                            paths: [trackFeatures]
                        },
                        symbol: {
                            type: "line-3d", // autocasts as new LineSymbol3D()
                            symbolLayers: [{
                                type: "line", // autocasts as new LineSymbol3DLayer()
                                material: {
                                    color: [255, 0, 0, 0.5]
                                },
                                size: 3
                            }]
                        }
                    });

                    satelliteTracks.add(track);
                }
            });

            const satelliteLayer = new GraphicsLayer();
            const satelliteTracks = new GraphicsLayer();
            map.add(satelliteLayer);
            map.add(satelliteTracks);

            const lines = data.split("\n");

            const satellites = [];

            for (let i = 0; i < count; i += 3) {
                let name = lines[i];
                let line1 = lines[i + 1];
                let line2 = lines[i + 2];

                satellites.push({
                    "name": name,
                    "line1": line1,
                    "line2": line2
                });
                console.log("added");

                let designator = line1.substring(9, 16);
                let launchYear = designator.substring(0, 2);
                const fullLaunchYear =
                    Number(launchYear) >= 57 ? `
                    19 $ {
                        launchYear
                    }
                    ` : `
                    20 $ {
                        launchYear
                    }
                    `;
                let launchNum = Number(designator.substring(2, 5)).toString();
                let noradId = Number(line1.substring(3, 7));

                let time = Date.now();
                let satelliteLoc = null;

                try {
                    satelliteLoc = getSatelliteLocation(new Date(time), line1, line2);
                } catch (error) {}

                if (name.includes("DEB")) {
                    if (satelliteLoc !== null) {
                        let prediction = Math.round((machineLearningRandomActivation() * 2) * 1000) / 10000;
                        let template = {
                            // autocasts as new PopupTemplate()
                            title: name,
                            content: "<h4>NORAD ID: {id}<h4/>" + "<h4>Collision Prediction: <b>{pred}%<b/><h4/>",
                            actions: [{
                                // Create a popup action to display the satellite track.
                                title: "Show 3 Hour Orbit",
                                id: "track",
                                className: "esri-icon-globe"
                            }]
                        };

                        let marker = new Graphic({
                            geometry: satelliteLoc,
                            symbol: {
                                type: "picture-marker", // autocasts as new PictureMarkerSymbol()
                                url: "https://i.ibb.co/4TqbS6C/kindpng-530446.png",
                                width: 20,
                            },
                            attributes: {
                                id: noradId,
                                pred: prediction,
                                number: launchNum,
                                time: time,
                                line1: line1,
                                line2: line2
                            },
                            popupTemplate: template
                        });

                        satelliteLayer.add(marker);
                    }
                } else {
                    if (satelliteLoc !== null) {

                        let marker = new Graphic({
                            geometry: satelliteLoc,
                            symbol: {
                                type: "point-3d",
                                symbolLayers: [{
                                    type: "icon",
                                    size: 4,
                                    resource: {
                                        primitive: "circle"
                                    },
                                    material: {
                                        color: "lightgray"
                                    }
                                }]
                            },
                            attributes: {
                                id: noradId,
                                number: launchNum,
                                time: time,
                                line1: line1,
                                line2: line2
                            },
                        });

                        satelliteLayer.add(marker);
                    }
                }

            }
            //console.log(satelliteLayer.graphics.items);

            (function myLoop(i) {
                setTimeout(function() {
                    for (let i = 0; i < count; i++) {
                        try {
                            let line1 = satellites[i]["line1"];
                            let line2 = satellites[i]["line2"];
                            let time = Date.now();
                            let satelliteLoc = null;
                            satelliteLoc = getSatelliteLocation(new Date(time), line1, line2);
                            satelliteLayer.graphics.items[i].geometry = satelliteLoc;
                        } catch (error) {}
                    }
                    if (--i) myLoop(i);
                }, 1000)
            })(60 * 60);

        });
